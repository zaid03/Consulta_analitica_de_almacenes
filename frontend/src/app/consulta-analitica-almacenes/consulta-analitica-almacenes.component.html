<div class="main-page">
    <div 
        class="sidebar-backdrop" 
        *ngIf="!sidebar.collapsed" 
        (click)="sidebar.collapsed = true"
    >
    </div>
    <app-sidebar #sidebar></app-sidebar>
    <div class="main-container" [class.blurred]="!sidebar.collapsed">
        <div class="title-menu">
            <div class="title-area">
                <h2 class="margin-title">Consulta del contabilizado</h2>  
            </div>
            <div class="search-holder">
                <div class="search-container">
                    <div class="search-form">
                        <span>Ejercicio</span>
                        <input 
                            type="text" 
                            class="search-bar smallWidth" 
                            name="ejercicio"
                            [(ngModel)]="eje"
                            disabled
                        >
                        <span>Mes</span>
                        <input 
                            type="number" 
                            name="factura" 
                            class="search-bar smallWidth"
                            [min]="1"
                            [max]="12"
                            [(ngModel)]="currentMonth"
                        />                      
                    </div>
                    <div class="btns">
                        <button type="button" class="purple-btn" >Buscar</button>
                        <button type="button" class="purple-btn" >Limpiar</button>
                    </div>
                </div>
            </div>
            <div class="group-menu" (click)="toggleMenu($event)">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="menu-panel" *ngIf="showMenu">
                    <button class="purple-btn" >Exportar a PDF</button>
                    <button class="purple-btn" >Exportar a EXCEL</button>
                </div>
            </div>
        </div>
        <h1 class="errorBtn">{{almacenError}}</h1>
        <h1 class="successBtn">{{almacenSuccess}}</h1>
        <div class="main-list">
            <div *ngIf="isLoading" class="loading-message">
                <div class="spinner"></div>
                <span>Cargando</span>
            </div>
            <table class="main-table">
                <thead>
                    <tr>
                        <th>Ejer/Periodo</th>
                        <th>Cód. Almacén</th>
                        <th>Descripción</th>
                        <th>Centro Gestor</th>
                        <th>Cód. Instalación</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let p of paginatedAlmacenes">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
